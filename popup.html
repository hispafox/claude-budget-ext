<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 290px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fafafa; color: #111827; padding: 16px; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .header .icon { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg, #3b82f6, #7c3aed); display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header .version { font-size: 10px; color: #9ca3af; font-family: monospace; margin-left: auto; }
    .section-title { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin: 12px 0 6px; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
    .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; margin-bottom: 5px; }
    .row:last-child { margin-bottom: 0; }
    .label { color: #6b7280; }
    .value { font-family: "SF Mono", monospace; font-weight: 600; color: #3b82f6; font-size: 13px; }
    .value.green { color: #16a34a; } .value.red { color: #dc2626; } .value.amber { color: #f59e0b; } .value.muted { color: #9ca3af; font-weight: 500; }
    .go-btn { display: block; width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; text-decoration: none; margin-top: 12px; }
    .go-btn:hover { background: #2563eb; }
    .footer { margin-top: 10px; font-size: 11px; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="icon">⚡</div>
    <h1>Claude Usage Budget</h1>
    <span class="version" id="ext-version"></span>
  </div>
  <div class="section-title">🔋 Sesión</div>
  <div class="card">
    <div class="row"><span class="label">Usado</span><span class="value" id="s-pct">—</span></div>
    <div class="row"><span class="label">Presupuesto</span><span class="value" id="s-budget">20%/h</span></div>
    <div class="row"><span class="label">Tiempo restante</span><span class="value" id="s-time">—</span></div>
  </div>
  <div class="section-title">🔥 Ritmo</div>
  <div class="card">
    <div class="row"><span class="label">Consumo</span><span class="value" id="r-value">—</span></div>
    <div class="row"><span class="label">Proyección</span><span class="value" id="r-proj">—</span></div>
    <div class="row"><span class="label">Fiabilidad</span><span class="value muted" id="r-conf">—</span></div>
  </div>
  <a class="go-btn" href="https://claude.ai/settings/usage" target="_blank">Abrir página de uso →</a>
  <div class="footer">Abre Configuración → Uso para ver el overlay completo</div>
  <script src="popup.js"></script>
</body>
</html>
